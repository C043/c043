name: Update top langs assets

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update-assets:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: top-langs
          options: layout=compact&langs_count=6&theme=github_dark&hide=html,css,json
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/top-langs.svg
          git pull
          git commit -m "Update top languages card" || exit 0
          git push

      - name: Build top-langs.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request
          import datetime

          username = os.environ["USERNAME"]
          token = os.environ["GH_TOKEN"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "github-actions",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          def get(url):
              req = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          repos = get(f"https://api.github.com/users/{username}/repos?per_page=100&type=owner")

          totals = {}
          for repo in repos:
              if repo.get("fork"):
                  continue
              langs = get(repo["languages_url"])
              for lang, count in langs.items():
                  totals[lang] = totals.get(lang, 0) + count

          sorted_langs = sorted(totals.items(), key=lambda x: x[1], reverse=True)

          top_langs = sorted_langs[:6]
          total_bytes = sum(count for _, count in top_langs)

          data = {
              "username": username,
              "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
              "total_bytes": total_bytes,
              "languages": [
                  {
                      "name": lang,
                      "bytes": count,
                      "percent": round((count / total_bytes) * 100, 2) if total_bytes else 0
                  }
                  for lang, count in top_langs
              ]
          }

          with open("top-langs.json", "w", encoding="utf-8") as f:
              json.dump(data, f, indent=2)
          PY

      - name: Update gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: 5cb72b76f14f3e368cd552333b5c65ac
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request

          gist_id = os.environ["GIST_ID"]
          token = os.environ["GIST_TOKEN"]

          with open("top-langs.json", "r", encoding="utf-8") as f:
              content = f.read()

          payload = {
              "files": {
                  "top-langs.json": {
                      "content": content
                  }
              }
          }

          req = urllib.request.Request(
              f"https://api.github.com/gists/{gist_id}",
              data=json.dumps(payload).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "Content-Type": "application/json",
                  "User-Agent": "github-actions",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
              method="PATCH"
          )

          with urllib.request.urlopen(req) as response:
              print(f"Gist updated: {response.status}")
          PY
